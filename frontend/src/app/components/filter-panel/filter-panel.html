<div class="filter-container">
    <div class="filter-header">
        <h3>Filtri Avanzati</h3>
        <button class="close-btn" (click)="onCloseClick()">
            <i class="bx bx-x"></i>
        </button>
    </div>

    <div class="filter-body">
        <div class="filter-section">
            <span class="section-label">Tipo Contratto</span>
            <div class="chips-container">  
                <button class="chip" 
                        [class.active]="filters.listingType === null" 
                        (click)="setType(null)">Qualsiasi</button>
                
                @for (t of typeChips; track t) 
                {
                    <button class="chip" 
                            [class.active]="filters.listingType === t" 
                            (click)="setType(t)">
                        {{ t === 'SALE' ? 'Vendita' : 'Affitto' }}
                    </button>
                }
            </div>
        </div>

        <div class="filter-section">
            <div class="form-field">
                <input type="number" id="minPrice" [(ngModel)]="filters.minPrice" placeholder=" ">
                <label for="minPrice">Prezzo Minimo (€)</label>
            </div>
            <div class="chips-container">
                <button class="chip" [class.active]="filters.minPrice === null" (click)="selectMinPrice(null)">Qualsiasi</button>
                @for (p of priceChips; track p) 
                {
                    <button class="chip" [class.active]="filters.minPrice === p" (click)="selectMinPrice(p)">{{ p | number:'1.0-0' }}€</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <div class="form-field">
                <input type="number" id="maxPrice" [(ngModel)]="filters.maxPrice" placeholder=" ">
                <label for="maxPrice">Prezzo Massimo (€)</label>
            </div>
            <div class="chips-container">
                <button class="chip" [class.active]="filters.maxPrice === null" (click)="selectMaxPrice(null)">Qualsiasi</button>
                @for (p of priceChips; track p) 
                {
                    <button class="chip" [class.active]="filters.maxPrice === p" (click)="selectMaxPrice(p)">{{ p | number:'1.0-0' }}€</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <span class="section-label">Stanze (minimo)</span>
            <div class="options-row">
                @for (n of [1, 2, 3, 4, 5]; track n) 
                {
                    <button class="opt-btn" [class.selected]="filters.minRooms === n" (click)="filters.minRooms = n">{{ n }}+</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <span class="section-label">Classe Energetica</span>
            <div class="energy-chips">
                <button class="chip" [class.active]="filters.energyClass === ''" (click)="filters.energyClass = ''">Qualsiasi</button>
                @for (cls of energyClasses; track cls) 
                {
                    <button class="chip" [class.active]="filters.energyClass === cls" (click)="filters.energyClass = cls">{{ cls }}</button>
                }
            </div>
        </div>
    </div>

    <div class="filter-footer">
        <button class="reset-btn" (click)="resetFilters()">Reset</button>
        
        <button class="apply-btn" (click)="applyFilters()">Search</button>
    </div>
</div>
