<div class="filter-container">
    <div class="filter-header">
        <h3>Advanced Filters</h3>
        <button class="close-btn" (click)="onCloseClick()">
            <i class="bx bx-x"></i>
        </button>
    </div>

    <div class="filter-body">
        <div class="filter-section">
            <span class="section-label">Contract Type</span>
            <div class="chips-container">  
                <button class="chip" 
                        [class.active]="filters.listingType === null" 
                        (click)="setType(null)">Any</button>
                
                @for (t of typeChips; track t) 
                {
                    <button class="chip" 
                            [class.active]="filters.listingType === t" 
                            (click)="setType(t)">
                        {{ t === 'SALE' ? 'Sale' : 'Rent' }}
                    </button>
                }
            </div>
        </div>

        <div class="filter-section">
            <div class="form-field">
                <input 
                    type="text" 
                    [value]="filters.minPrice"
                    (keydown)="blockInvalidChars($event)"
                    (input)="validateNumericInput($event, 'minPrice')"
                    inputmode="numeric"
                    placeholder=" ">
                <label for="minPrice">Minimum Price</label>
            </div>
            <div class="chips-container">
                <button class="chip" [class.active]="filters.minPrice === null" (click)="selectMinPrice(null)">Any</button>
                @for (p of priceChips; track p) 
                {
                    <button class="chip" [class.active]="filters.minPrice === p" (click)="selectMinPrice(p)">{{ p | number:'1.0-0' }}€</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <div class="form-field">
                <input 
                    type="text" 
                    [value]="filters.maxPrice"
                    (keydown)="blockInvalidChars($event)"
                    (input)="validateNumericInput($event, 'maxPrice')"
                    inputmode="numeric"
                    placeholder=" ">
                <label for="maxPrice">Maximum Price</label>
            </div>
            <div class="chips-container">
                <button class="chip" [class.active]="filters.maxPrice === null" (click)="selectMaxPrice(null)">Any</button>
                @for (p of priceChips; track p) 
                {
                    <button class="chip" [class.active]="filters.maxPrice === p" (click)="selectMaxPrice(p)">{{ p | number:'1.0-0' }}€</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <span class="section-label">Rooms</span>
            <div class="options-row">
                @for (n of [1, 2, 3, 4, 5]; track n) 
                {
                    <button class="opt-btn" [class.selected]="filters.minRooms === n" (click)="filters.minRooms = n">{{ n }}+</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <span class="section-label">Energy Class</span>
            <div class="energy-chips">
                <button class="chip" [class.active]="filters.energyClass === ''" (click)="filters.energyClass = ''">Any</button>
                @for (cls of energyClasses; track cls) 
                {
                    <button class="chip" [class.active]="filters.energyClass === cls" (click)="filters.energyClass = cls">{{ cls }}</button>
                }
            </div>
        </div>

        <div class="filter-section">
            <span class="section-label">Near Services</span>
            <div class="poi-filter-container">
                
                <button class="poi-btn" 
                        [class.active]="filters.nearSchools" 
                        (click)="filters.nearSchools = !filters.nearSchools"
                        [attr.data-tooltip]="'Schools'">
                    <lucide-icon name="school" [size]="18"></lucide-icon>
                </button>

                <button class="poi-btn" 
                        [class.active]="filters.nearStops" 
                        (click)="filters.nearStops = !filters.nearStops"
                        [attr.data-tooltip]="'Public Transports'">
                    <i class="bi bi-bus-front-fill"></i>
                </button>

                <button class="poi-btn" 
                        [class.active]="filters.nearParks" 
                        (click)="filters.nearParks = !filters.nearParks"
                        [attr.data-tooltip]="'Green Areas & Parks'">
                    <i class="bi bi-tree"></i>
                </button>

            </div>
        </div>
    </div>

    <div class="filter-footer">
        <button class="reset-btn" (click)="resetFilters()">Reset</button>
        
        <button class="apply-btn" (click)="applyFilters()">Search</button>
    </div>
</div>
