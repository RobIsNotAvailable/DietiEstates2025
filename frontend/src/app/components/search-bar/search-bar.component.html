<div class="search-bar-advanced">
    <div class="search-group search-main">
        <i class="bi bi-search search-icon"></i>
        <input 
            type="text" 
            [(ngModel)]="searchCity" 
            placeholder="Search by city or area" 
            class="search-input"
        >
    </div>

    <div class="divider"></div>

    <div class="search-right-side">
        <div class="select-pill-wrapper">
            <select class="search-select" [(ngModel)]="contractType">
                <option value="">All</option>
                <option value="sale">Sale</option>
                <option value="rent">Rent</option>
            </select>
            <i class="bi bi-chevron-down select-arrow"></i>
        </div>

        <button class="btn-filters">
            <i class="bi bi-sliders"></i> Filters
        </button>

        <button class="btn-search-main" (click)="onSearch()">
            <i class="bi bi-geo-alt"></i> Search
        </button>
    </div>
</div>
