<div class="search-bar-advanced">
    <div class="search-group search-main">
        <i class="bi bi-search search-icon"></i>
        <input 
            type="text" 
            [(ngModel)]="searchCity" 
            (input)="onInputChange($any($event.target).value)"
            [placeholder]="inputError ? 'Please select a location from the list' : 'Search by city or area'" 
            [class.input-error]="inputError"
            class="search-input">
    </div>

    <div class="divider"></div>

    <div class="search-right-side">
        <button (click)="onFilterClick()" class="btn-filters">
            Filters
        </button>

        <button class="btn-search-main" (click)="onSearch()">
            <i class="bi bi-geo-alt"></i> Search
        </button>
    </div>

    <div class="suggestions-panel" *ngIf="suggestions.length > 0">
        <div class="suggestion-item" *ngFor="let s of suggestions" (click)="selectSuggestion(s)">
            <i class='bx bxs-map'></i>
            <div class="suggestion-text">
                <span class="main-address">{{ s.main_text }}</span>
                <span class="sub-address">{{ s.secondary_text }}</span>
            </div>
        </div>
    </div>
</div>
