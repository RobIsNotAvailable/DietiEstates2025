<div class="forgot-wrapper">
    <div class="auth-container">
        <header class="logo-box">
            <a routerLink="/" class="logo-section">
                <div class="logo-icon">
                    <i class="bx bx-home"></i>
                </div>
                <span class="logo-text">DietiEstates</span>
            </a>
        </header>


        <div class="forgot-card">
            <h1>Reset password</h1>
            <p>We'll send you a link to set up a new password</p>
            
            <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
                <div class="form-field">
                    <input type="email" id="emailField" formControlName="email" placeholder=" "
                        [class.is-invalid]="(isSubmitted && forgotForm.get('email')?.invalid) || serverErrorMessage">
                    
                    <label for="emailField">Email</label>
                    
                    <div *ngIf="serverErrorMessage && serverErrorMessage.toLowerCase().includes('email')" class="error-message">
                        {{ serverErrorMessage }}
                    </div>
                </div>

                
                <button type="submit" [disabled]="forgotForm.invalid">Send Email</button>
            </form>
        </div>
    </div>
</div>
