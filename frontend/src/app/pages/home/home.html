<div style="padding: 50px; text-align: center; font-family: 'Segoe UI', sans-serif;">
    <h1>Home Page</h1>

    <div style="margin-top: 30px;">
        @if (isUserLoggedIn) 
        {
            <h2 style="color: green;">Benvenuto! Sei loggato.</h2>
            <button (click)="onLogout()" 
                    style="padding: 10px 25px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Logout
            </button>
        } 
        @else 
        {
            <h2 style="color: #636e72;">Non sei loggato.</h2>
            <button (click)="goToLogin()" 
                    style="padding: 10px 25px; background: #000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Vai al Login
            </button>
        }
    </div>
</div>
