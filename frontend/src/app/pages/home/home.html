
<div class="top-section">
    <header class="main-header">
      <div class="header-container">
        
        <a routerLink="/" class="logo-section">
          <i class="bx bx-home"></i>
          <span class="logo-text">DietiEstates</span>
        </a>

        <div class="auth-buttons">
          @if (!isUserLoggedIn) 
          {
            <button class="btn-secondary" (click)="goToLogin()">Login</button>
            <button class="btn-primary" (click)="goToRegister()">Register</button>
          } 
          @else 
          {
            <span class="welcome-text">Welcome</span>
            <button class="btn-link" (click)="onLogout()">Logout</button>
          }
        </div>
      </div>
    </header>

    <section class="hero-section">
      <div class="hero-background"></div>

      <div class="search-wrapper">
        <div class="search-bar-advanced">
          
          <div class="search-group search-main">
            <i class="bi bi-search search-icon"></i>
            <input type="text" placeholder="Search by city or area" class="search-input">
          </div>

          <div class="divider"></div>

          <div class="search-right-side">
            
            <div class="select-pill-wrapper">
              <select class="search-select">
                <option value="">Select type</option>
                <option value="vendita">Sale</option>
                <option value="affitto">Rent</option>
              </select>
              <i class="bi bi-chevron-down select-arrow"></i>
            </div>

            <button class="btn-filters">
              <i class="bi bi-sliders"></i> Filters
            </button>

            <button class="btn-search-main">
              <i class="bi bi-geo-alt"></i> Search
            </button>
          </div>

      </div>
    </div>
  </section>
</div>
