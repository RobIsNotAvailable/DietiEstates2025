<div class="home-layout-wrapper" [class.filters-active]="isFiltersOpen">
    
    <div class="main-content-column">
        <div class="home-container">
            @if (isLoading) 
            {
                <div class="loading-overlay">
                    <div class="spinner"></div>
                    <p>{{ loadingMessage }}</p>
                </div>
            }

            <div class="top-section">
                <header class="main-header">
                    <div class="header-container">
                        <a routerLink="/" class="logo-section">
                            <div class="logo-icon">
                                <i class="bx bx-home"></i>
                            </div>
                            <span class="logo-text">DietiEstates</span>
                        </a>

                        <div class="auth-buttons">
                            @if (!isUserLoggedIn) 
                            {
                                <button class="btn-secondary" (click)="goToLogin()">Login</button>
                                <button class="btn-primary" (click)="goToRegister()">Register</button>
                            } 
                            @else 
                            {
                                <div class="user-menu-wrapper">
                                    <div class="user-trigger" (click)="toggleDropdown(); $event.stopPropagation()">
                                        <div class="user-avatar">
                                            <i class='bx bxs-user'></i>
                                        </div>
                                        <span class="welcome-text">
                                            Welcome, {{ userData?.firstName }}
                                        </span>
                                        <i class='bx bx-chevron-down arrow-icon' [class.rotate]="isDropdownOpen"></i>
                                    </div>

                                    <div class="dropdown-menu" *ngIf="isDropdownOpen">
                                        <div class="dropdown-item" (click)="goToChangePassword()">
                                            <i class='bx bx-user'></i>
                                            <span>Change Password</span>
                                        </div>
                                        <div class="dropdown-divider"></div>
                                        <div class="dropdown-item logout-action" (click)="onLogout()">
                                            <i class='bx bx-log-out'></i>
                                            <span>Logout</span>
                                        </div>
                                    </div>
                                </div>
                            }
                        </div>
                    </div>
                </header>

                <section class="hero-section">
                    <div class="hero-background"></div>

                    <div class="search-wrapper">
                        <app-search-bar 
                            (toggleFilters)="isFiltersOpen = !isFiltersOpen"
                            (locationSelected)="handleLocationChange($event)"
                            (search)="handleSearchBarSearch()">
                        </app-search-bar>
                    </div>
                </section>
            </div>

            <div class="bottom-section">
                <div class="main-content-card">
                    <div class="section-header">
                        <h2>{{ sectionTitle }}</h2>
                        <div class="accent-line"></div>
                    </div>

                    <div class="quick-options-grid">
                        @for (item of quickOptions; track item.title) 
                        {
                            <div class="quick-action-card" 
                                [ngClass]="{'is-locked': !isUserLoggedIn}"
                                (click)="isUserLoggedIn ? handleAction(item.action) : null">
                                
                                <div class="icon-container">
                                    <i class='bx' [ngClass]="item.icon"></i>
                                    @if (!isUserLoggedIn) 
                                    {
                                        <div class="lock-badge">
                                            <i class='bx bxs-lock-alt'></i>
                                        </div>
                                    }
                                </div>

                                <div class="card-text">
                                    <h3>{{ item.title }}</h3>
                                    <p>{{ item.subtitle }}</p>
                                </div>
                            </div>
                        }
                    </div>
                </div>
            </div>
        </div>
    </div>

    <app-filter-panel 
        [isOpen]="isFiltersOpen" 
        (close)="isFiltersOpen = false"
        (onSearch)="handleFilterChange($event)"
        (onReset)="currentFilters = {}">
    </app-filter-panel>
</div>
