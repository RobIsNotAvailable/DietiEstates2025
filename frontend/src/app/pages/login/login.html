<div class="login-wrapper">
    <div class="login-card">
        <h2>Login To DietiEstates</h2>
        
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-field">
                <label>Email</label>
                <input type="email" formControlName="email" 
                    [class.is-invalid]="(isSubmitted && loginForm.get('email')?.invalid) || serverErrorMessage">
            </div>

            <div class="form-field">
                <label>Password</label>
                <div class="input-wrapper" style="position: relative;">
                    <input [type]="hidePassword ? 'password' : 'text'" 
                        formControlName="rawPassword"
                        [class.is-invalid]="(isSubmitted && loginForm.get('rawPassword')?.invalid) || serverErrorMessage">
                    
                    <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
                        <i [className]="hidePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                    </button>
                </div>
                <div *ngIf="serverErrorMessage" class="error-message">
                    {{ serverErrorMessage }}
                </div>
            </div>
            <button type="submit" [disabled]="loginForm.invalid">Login</button>
        </form>

        <div class="register-section">
            <span>Don't have an account? </span>
            <button type="button" class="btn-link" (click)="goToRegister()">Register now</button>
        </div>
    </div>
</div>
