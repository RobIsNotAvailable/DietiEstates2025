<div class="login-wrapper">
  <div class="login-card">
    <h2>DietiEstates Login</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="esempio@email.it">
      </div>

      <div class="form-field">
        <label>Password</label>
        <input type="password" formControlName="rawPassword" placeholder="Inserisci password">
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Accedi</button>
    </form>

    <div class="register-link">
        <p>Non hai ancora un account? <a routerLink="/register">Registrati ora</a></p>
    </div>
  </div>
</div>
