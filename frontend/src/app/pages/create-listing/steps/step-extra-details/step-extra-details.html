<form class="extra-details-container" *ngIf="parentForm" [formGroup]="extraGroup">
    <div class="form-row">
        <div class="form-field">
            <input type="number" id="listingFloor" formControlName="floor" placeholder=" ">
            <label for="listingFloor">Floor</label>
        </div>

        <div class="form-field">
            <input type="text" id="listingInner" formControlName="intern" placeholder=" ">
            <label for="listingInner">Internal (e.g. 15B)</label>
        </div>
    </div>

    <div class="form-row">
        <div class="form-field">
            <select id="listingElevator" formControlName="hasElevator" [class.has-value]="extraGroup.get('hasElevator')?.value !== ''">
                <option value="" selected hidden></option>
                <option [ngValue]="true">Yes</option>
                <option [ngValue]="false">No</option>
            </select>
            <label for="listingElevator">Elevator</label>
            <i class="bx bx-chevron-down select-icon"></i>
        </div>
        
        <div class="form-field">
            <select id="energyClass" formControlName="energyClass" [class.has-value]="extraGroup.get('energyClass')?.value !== ''">
                <option value="" selected hidden></option>
                <option value="A4">A4</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="G">G</option>
            </select>
            <label for="energyClass">Energy Class</label>
            <i class="bx bx-chevron-down select-icon"></i>
        </div>
    </div>

    <div class="form-field textarea-field">
        <textarea id="extraDetails" formControlName="extraDetails" rows="5" placeholder=" "></textarea>
        <label for="extraDetails">Extra Details</label>
    </div>

    <p class="info-text">* all fields are mandatory</p>
</form>
