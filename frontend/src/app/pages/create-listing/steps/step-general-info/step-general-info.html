<form class="general-info-container" *ngIf="parentForm" [formGroup]="generalGroup">
    <div class="form-row">
        <div class="form-field main-field">
            <input type="text" id="listingName" formControlName="name" placeholder=" ">
            <label for="listingName">Listing Name</label>
        </div>
    </div>

    <div class="form-row">
        <div class="form-field price-field">
            <input type="text" 
                   id="listingPrice" 
                   [value]="formattedPrice" 
                   (input)="formatPrice($event)" 
                   placeholder=" ">
            <label for="listingPrice">Price (€)</label>
        </div>

        <div class="form-field">
            <select id="listingType" formControlName="type" [class.has-value]="generalGroup.get('type')?.value">
                <option value="" selected hidden></option>
                <option value="vendita">Sale</option>
                <option value="affitto">Rent</option>
            </select>
            <label for="listingType">Listing Type</label>
            <i class="bx bx-chevron-down select-icon"></i>
        </div>
    </div>

    <div class="form-row">
        <div class="form-field">
            <input type="number" id="listingSurface" formControlName="surface" placeholder=" ">
            <label for="listingSurface">Surface (m²)</label>
        </div>

        <div class="form-field">
            <input type="number" id="listingRooms" formControlName="rooms" placeholder=" ">
            <label for="listingRooms">Number of Rooms</label>
        </div>
    </div>

    <div class="form-field textarea-field">
        <textarea id="listingDescription" formControlName="description" rows="5" placeholder=" "></textarea>
        <label for="listingDescription">Description</label>
    </div>

    <p class="info-text">* all fields are mandatory</p>
</form>
