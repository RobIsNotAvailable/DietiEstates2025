<div class="change-password-wrapper">
    <div class="auth-container">
        <header class="logo-box">
            <a routerLink="/" class="logo-section">
                <div class="logo-icon">
                    <i class="bx bx-home"></i>
                </div>
                <span class="logo-text">DietiEstates</span>
            </a>
        </header>

        <div class="form-card">
            <div class="auth-header">
                <h2>Change Password</h2>
            </div>

            <form [formGroup]="setupForm" (ngSubmit)="onSubmit()">
                
                <div class="form-field">
                    <div class="input-wrapper">
                        <input [type]="hideOldPassword ? 'password' : 'text'" 
                            formControlName="oldPassword" 
                            placeholder=" " 
                            id="oldPassword"
                            [class.is-invalid]="(isSubmitted && setupForm.get('oldPassword')?.invalid) || (serverErrorMessage && serverErrorMessage.toLowerCase().includes('old'))">
                        
                        <label for="oldPassword">Old Password</label>

                        <button type="button" class="toggle-password" (click)="toggleOldPassword()" tabindex="-1">
                            <i [className]="hideOldPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                        </button>
                    </div>

                    <div *ngIf="serverErrorMessage && serverErrorMessage.toLowerCase().includes('old')" class="error-message">
                        {{ serverErrorMessage }}
                    </div>
                </div>

                <div class="form-field">
                    <div class="input-wrapper">
                        <input [type]="hideNewPassword ? 'password' : 'text'" 
                            formControlName="newPassword" 
                            placeholder=" " 
                            id="newPassword"
                            [class.is-invalid]="(isSubmitted && setupForm.get('newPassword')?.invalid) || (serverErrorMessage && serverErrorMessage.toLowerCase().includes('new'))">
                        
                        <label for="newPassword">New Password</label>

                        <button type="button" class="toggle-password" (click)="toggleNewPassword()" tabindex="-1">
                            <i [className]="hideNewPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                        </button>
                    </div>

                    <div *ngIf="serverErrorMessage && serverErrorMessage.toLowerCase().includes('new')" class="error-message">
                        {{ serverErrorMessage }}
                    </div>
                </div>

                <div class="form-field">
                    <input [type]="hideNewPassword ? 'password' : 'text'" 
                        formControlName="repeatPassword" 
                        id="repeatPassword"
                        placeholder=" " 
                        [class.is-invalid]="isSubmitted && setupForm.hasError('mismatch')">
                    
                    <label for="repeatPassword">Repeat Password</label>
                    
                    <div *ngIf="isSubmitted && setupForm.hasError('mismatch')" class="error-message">
                        Passwords do not match
                    </div>
                </div>

                <button type="submit" [disabled]="isButtonDisabled()">Change Password</button>
            </form>
        </div>
    </div>
</div>
