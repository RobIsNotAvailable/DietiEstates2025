<div class="register-wrapper">
    <div class="auth-container">
        <header class="logo-box">
            <a routerLink="/" class="logo-section">
                <div class="logo-icon">
                    <i class="bx bx-home"></i>
                </div>
                <span class="logo-text">DietiEstates</span>
            </a>
        </header>

        <div class="register-card">
            <h2>Create Account</h2>
            
            <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
                <div class="form-field">
                    <label>First Name</label>
                    <input type="text" formControlName="firstName" placeholder="Your first name">
                </div>

                <div class="form-field">
                    <label>Last Name</label>
                    <input type="text" formControlName="lastName" placeholder="Your last name">
                </div>

                <div class="form-field">
                    <label>Email</label>
                    <input type="email" formControlName="email" placeholder="example@email.it"
                        [class.is-invalid]="(isSubmitted && registerForm.get('email')?.invalid) || (serverErrorMessage && serverErrorMessage.toLowerCase().includes('email'))">
                    
                    <div *ngIf="serverErrorMessage && serverErrorMessage.toLowerCase().includes('email')" class="error-message">
                        {{ serverErrorMessage }}
                    </div>
                </div>

                <div class="form-field">
                    <label>Password</label>
                    <div class="input-wrapper" style="position: relative;">
                        <input [type]="hidePassword ? 'password' : 'text'" 
                            formControlName="rawPassword" placeholder="password"
                            [class.is-invalid]="(isSubmitted && registerForm.get('rawPassword')?.invalid) || (serverErrorMessage && !serverErrorMessage.toLowerCase().includes('email'))">
                        
                        <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
                            <i [className]="hidePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                        </button>
                    </div>
                    
                    <div *ngIf="serverErrorMessage && !serverErrorMessage.toLowerCase().includes('email')" class="error-message">
                        {{ serverErrorMessage }}
                    </div>
                </div>

                <div class="form-field">
                    <label>Ripeti Password</label>
                    <input [type]="hidePassword ? 'password' : 'text'" 
                        formControlName="repeatPassword" 
                        placeholder="Repeat your password"
                        [class.is-invalid]="isSubmitted && registerForm.hasError('mismatch')">
                    
                    <div *ngIf="isSubmitted && registerForm.hasError('mismatch')" 
                        class="error-message">
                        Passwords do not match
                    </div>
                </div>

                <button type="submit" [disabled]="isButtonDisabled()">Register</button>
            </form>

            <div class="login-section">
                <span>Already have an account? </span>
                <button type="button" class="btn-link" (click)="goToLogin()">Go to login</button>
            </div>
        </div>
    </div>
</div>
