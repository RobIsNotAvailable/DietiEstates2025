<div class="register-wrapper">
    <div class="register-card">
        <h2>Crea Account</h2>
        
        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
            <div class="form-field">
                <label>Nome</label>
                <input type="text" formControlName="firstName" placeholder="Il tuo nome">
            </div>

            <div class="form-field">
                <label>Cognome</label>
                <input type="text" formControlName="lastName" placeholder="Il tuo cognome">
            </div>

            <div class="form-field">
                <label>Email</label>
                <input type="email" formControlName="email" placeholder="esempio@email.it">
            </div>

            <div class="form-field">
                <label>Password</label>
                <input [type]="hidePassword ? 'password' : 'text'" formControlName="rawPassword" placeholder="La tua password"
      
                    (input)="registerForm.updateValueAndValidity()"> 
                <div 
                    *ngIf="registerForm.hasError('mismatch') && registerForm.get('repeatPassword')?.dirty">
                </div>

                <button type="button" class="toggle-password" (click)="togglePassword()">
                    <i [className]="hidePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>

                <div *ngIf="registerForm.get('rawPassword')?.errors?.['pattern'] && registerForm.get('rawPassword')?.dirty" 
                    class="error-message">
                    La password deve contenere almeno 8 caratteri, una lettera e un numero.
                </div>
            </div>

            <div class="form-field">
                <label>Ripeti Password</label>
                <input [type]="hidePassword ? 'password' : 'text'" 
                    formControlName="repeatPassword" 
                    placeholder="Ripeti la password"
                    (input)="registerForm.updateValueAndValidity()"> 
                <div *ngIf="registerForm.hasError('mismatch') && registerForm.get('repeatPassword')?.dirty" 
                    class="error-message">
                    Le password non coincidono
                </div>
            </div>

            <button type="submit" [disabled]="registerForm.invalid">Registrati</button>
        </form>

        <div class="login-section">
            <span>Hai già un account? </span>
            <button type="button" class="btn-link" (click)="goToLogin()">Vai al login</button>
        </div>
    </div>
</div>
