<div class="register-wrapper">
    <div class="register-card">
        <h2>Crea Account</h2>
        
        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
            <div class="form-field">
                <label>Nome</label>
                <input type="text" formControlName="nome" placeholder="Il tuo nome">
            </div>

            <div class="form-field">
                <label>Cognome</label>
                <input type="text" formControlName="cognome" placeholder="Il tuo cognome">
            </div>

            <div class="form-field">
                <label>Email</label>
                <input type="email" formControlName="email" placeholder="esempio@email.it">
            </div>

            <div class="form-field">
                <label>Password</label>
                <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Minimo 8 caratteri">
                
                <button type="button" class="toggle-password" (click)="togglePassword()">
                    <i [className]="hidePassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
            </div>

            <button type="submit" [disabled]="registerForm.invalid">Registrati</button>
        </form>

        <div class="login-section">
            <span>Hai già un account? </span>
            <button type="button" class="btn-link" (click)="goToLogin()">Vai al login</button>
        </div>
    </div>
</div>
